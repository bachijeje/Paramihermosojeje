<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Mi Precioso 💛</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ffd6e7,#fff3b0);
overflow:hidden;
color:#333;
}

/* corazones flotando */

.heart{
position:fixed;
bottom:-10px;
font-size:20px;
animation:float 6s linear infinite;
opacity:0.7;
}

@keyframes float{
0%{transform:translateY(0) scale(1);}
100%{transform:translateY(-110vh) scale(1.5);}
}

/* tarjeta central */

.card{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:40px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
max-width:500px;
animation:fadeIn 2s;
}

@keyframes fadeIn{
from{opacity:0; transform:translate(-50%,-60%);}
to{opacity:1; transform:translate(-50%,-50%);}
}

h1{
font-size:40px;
margin-bottom:10px;
}

p{
font-size:18px;
line-height:1.6;
}

/* boton */

button{
margin-top:20px;
padding:14px 25px;
border:none;
border-radius:20px;
background:#ff6fa5;
color:white;
font-size:17px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
background:#ff4f93;
}

/* mensaje oculto */

#mensaje{
margin-top:20px;
font-size:20px;
display:none;
animation:fadeIn 1s;
}

/* contador */

#contador{
margin-top:15px;
font-size:16px;
color:#666;
}

</style>
</head>

<body>

<div class="card">

<h1>Para Mi Precioso 💛</h1>

<p>
Hice esta página solo para ti.
Porque eres una persona increíble
y me haces sentir cosas que nadie más logra.
</p>

<button onclick="mostrar()">Haz click aquí</button>

<div id="mensaje">
Te amo muchísimo 💛  
Y siempre voy a estar para ti.
</div>

<div id="contador">
Amándote desde: <span id="tiempo"></span>
</div>

</div>

<script>

/* mensaje */

function mostrar(){
document.getElementById("mensaje").style.display="block";
}

/* corazones */

function crearCorazon(){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💛";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+10)+"px";
heart.style.animationDuration=(Math.random()*3+3)+"s";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove()},6000);
}

setInterval(crearCorazon,400);

let horas=Math.floor(diff/(1000*60*60)%24);

document.getElementById("tiempo").innerText=
dias+" días "+horas+" horas "+mins+" minutos";

</script>

</body>
</html>
